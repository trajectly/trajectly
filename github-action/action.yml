name: Trajectly (Deprecated Wrapper)
description: >
  Deprecated compatibility wrapper.
  Use trajectly/trajectly-action@1d7700be6142edafd25439354a2df9169932455d # v1.0.2
branding:
  icon: check-circle
  color: blue

inputs:
  spec_glob:
    description: Glob pattern for agent spec files
    required: false
    default: "specs/*.agent.yaml"
  project_root:
    description: Root directory of the project
    required: false
    default: "."
  python_version:
    description: Python version to use
    required: false
    default: "3.11"
  install:
    description: >
      How to install trajectly: "editable" (pip install -e .) or "pypi" (pip install trajectly)
      Deprecated wrapper default remains "editable" for backward compatibility.
    required: false
    default: "editable"
  comment_pr:
    description: >
      Post a PR comment with the report summary.
      Deprecated wrapper default remains "true" for backward compatibility.
    required: false
    default: "true"
  upload_artifacts:
    description: Upload .trajectly/** as build artifacts
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Deprecation notice
      shell: bash
      run: |
        echo "::warning::./github-action is deprecated and will be removed after one release cycle. Use trajectly/trajectly-action@v1."

    - name: Run canonical Trajectly action
      uses: trajectly/trajectly-action@1d7700be6142edafd25439354a2df9169932455d # v1.0.2
      with:
        spec_glob: ${{ inputs.spec_glob }}
        project_root: ${{ inputs.project_root }}
        python_version: ${{ inputs.python_version }}
        install: ${{ inputs.install }}
        comment_pr: ${{ inputs.comment_pr }}
        upload_artifacts: ${{ inputs.upload_artifacts }}
