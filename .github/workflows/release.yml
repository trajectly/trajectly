name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine
      - name: Validate
        run: |
          set -euo pipefail
          blocked_paths=(
            "first_prompt.txt"
            "first_prompt.md"
            "dev_prompt.txt"
            "dev_prompt.md"
            "PLAN.md"
            ".private/"
            "internal/"
          )
          violations=()
          for path in "${blocked_paths[@]}"; do
            while IFS= read -r tracked; do
              [ -n "$tracked" ] && violations+=("$tracked")
            done < <(git ls-files -- "$path")
          done
          if [ ${#violations[@]} -gt 0 ]; then
            echo "Blocked private/development files are tracked in git:" >&2
            printf ' - %s\n' "${violations[@]}" >&2
            exit 1
          fi
          echo "Private file policy check passed."
          ruff check .
          mypy src
          pytest -q
      - name: Build package artifacts
        run: |
          python -m build
          python -m twine check dist/*
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@106e0b0b7c337fa67ed433972f777c6357f78598 # v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
