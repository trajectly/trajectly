name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Private File Policy
        run: |
          set -euo pipefail
          blocked_paths=(
            "first_prompt.txt"
            "first_prompt.md"
            "dev_prompt.txt"
            "dev_prompt.md"
            "PLAN.md"
            ".private/"
            "internal/"
          )
          violations=()
          for path in "${blocked_paths[@]}"; do
            while IFS= read -r tracked; do
              [ -n "$tracked" ] && violations+=("$tracked")
            done < <(git ls-files -- "$path")
          done
          if [ ${#violations[@]} -gt 0 ]; then
            echo "Blocked private/development files are tracked in git:" >&2
            printf ' - %s\n' "${violations[@]}" >&2
            exit 1
          fi
          echo "Private file policy check passed."
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Test
        run: pytest -q
      - name: Determinism Replay Tests
        run: pytest -q tests/integration/test_determinism_replay.py
      - name: Coverage
        run: pytest --cov=src/trajectly --cov-report=term-missing -q
      - name: Smoke
        run: |
          python -m trajectly init
          python -m trajectly record tests/*.agent.yaml
          python -m trajectly run tests/*.agent.yaml
