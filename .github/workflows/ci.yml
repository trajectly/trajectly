name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Private File Policy
        run: |
          set -euo pipefail
          blocked_paths=(
            "first_prompt.txt"
            "first_prompt.md"
            "dev_prompt.txt"
            "dev_prompt.md"
            "PLAN.md"
            ".private/"
            "internal/"
          )
          violations=()
          for path in "${blocked_paths[@]}"; do
            while IFS= read -r tracked; do
              [ -n "$tracked" ] && violations+=("$tracked")
            done < <(git ls-files -- "$path")
          done
          if [ ${#violations[@]} -gt 0 ]; then
            echo "Blocked private/development files are tracked in git:" >&2
            printf ' - %s\n' "${violations[@]}" >&2
            exit 1
          fi
          echo "Private file policy check passed."
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src
      - name: Platform API Compatibility
        run: |
          pytest -q \
            tests/unit/test_core_evaluate_api.py \
            tests/unit/test_write_public_api_surface_documentation.py \
            tests/unit/test_platform_api_contract.py \
            tests/unit/test_add_platform_boundary_enforcement_tests.py \
            tests/unit/test_boundary_enforcement.py \
            tests/integration/test_platform_evaluate_import.py \
            tests/integration/test_platform_api_smoke.py \
            tests/integration/test_add_ci_compatibility_gate_for_platform_facing_api.py
      - name: Test
        run: pytest -q
      - name: Determinism Replay Tests
        run: pytest -q tests/integration/test_determinism_replay.py
      - name: Coverage
        run: pytest --cov=src/trajectly --cov-report=term-missing -q
      - name: Smoke
        run: |
          python -m trajectly init
          python -m trajectly record tests/*.agent.yaml
          python -m trajectly run tests/*.agent.yaml

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix runs failed."
            exit 1
          fi
          echo "All matrix runs passed."
