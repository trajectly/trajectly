name: codeql

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "45 7 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ccdb31a30b64f237d5e093766753e134dd045e07 # v3.32.5
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ccdb31a30b64f237d5e093766753e134dd045e07 # v3.32.5
